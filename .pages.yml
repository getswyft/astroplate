media:
  input: src/media
  output: /media
content:
  - name: posts
    label: Posts
    type: collection
    path: src/posts
    fields:
      - name: title
        type: string
      - name: body
        type: rich-text
  - name: recipes
    label: Recipes
    type: collection
    path: src/recipes
    fields:
      - name: title
        type: string
      - name: cover
        label: Cover image
        type: image
        options:
          media: images
          path: public/images/recipes
      - name: gallery
        label: Gallery
        type: image
        options:
          multiple:
            max: 6
          unique: true
          extensions: [jpg, png, webp]
          rename: true
      - name: body
        type: rich-text
  - name: site
    label: Site settings
    type: file
    path: src/_data/site.json
    fields:
      - name: title
        type: string
      - name: description
        type: text
      - name: url
        type: string
actions:
  - name: deploy-site
    label: Deploy site
    workflow: pages-cms-action.yml